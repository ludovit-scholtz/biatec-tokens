name: Build and Deploy FE
on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "docker/**"
      - "k8s/**"
      - "public/**"
      - "package-lock.json"
      - ".github/workflows/build-fe.yml"

env:
  DOCKERHUB_IMAGE: scholtz2/biatec-tokens-fe
  VITE_API_BASE_URL: "https://api.tokens.biatec.io"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Generate version
        id: vars
        run: |
          DATE=$(date +'%Y.%m.%d')
          echo "version=1.$DATE-main" >> $GITHUB_OUTPUT

      #      - name: Setup Node.js
      #        uses: actions/setup-node@v6
      #        with:
      #          node-version: '20'
      #          cache: 'npm'

      #      - name: Install dependencies
      #        run: npm ci

      #      - name: Run tests with coverage
      #        run: npm run test:coverage

      #      - name: Build application
      #        run: npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest

      # -----------------------
      # Deploy to Kubernetes
      # -----------------------
      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_CONTENT }}" > ~/.kube/config

      - name: Update manifest image tag
        run: |
          sed -i "s#image: \\S\+#image: ${{ env.DOCKERHUB_IMAGE }}:${{ steps.vars.outputs.version }}#" k8s/main/deployment-fe.yaml
          echo '----- Modified manifest (image lines) -----'
          grep -n 'image:' k8s/main/deployment-fe.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/main/deployment-fe.yaml

      - name: Restart & Verify rollout
        run: |
          kubectl rollout restart deployment/biatec-tokens-fe-app-deployment -n biatec-tokens
          kubectl rollout status deployment/biatec-tokens-fe-app-deployment -n biatec-tokens
